apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq-deploymant
spec:
  replicas: 1
  selector:
    matchLabels:
      components: rabbitmq
  template:  
    metadata:
      name: rabbitmq
      labels:
        components: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.12.7
          ports:
            - containerPort: 5672
          env:
            - name: SEED_USERNAME
              value: demo
            - name: SEED_USER_PASSWORD
              value: demo
          resources:
            limits:
              memory: "512Mi"
              cpu: "300m"
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq/mnesia/
              subPath: rabbitmq
      volumes:
        - name: rabbitmq-data
          persistentVolumeClaim:
            claimName: rabbitmq-pvc