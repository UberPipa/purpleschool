apiVersion: apps/v1
kind: Deployment
metadata:
  name: short-app-deploymant
spec:
  replicas: 1
  selector:
    matchLabels:
      components: frontend
  template:  
    metadata:
      name: short-app
      labels:
        components: frontend
    spec:
      containers:
        - name: short-app
          image: antonlarichev/short-app:v1.0
#          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"